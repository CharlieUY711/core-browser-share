<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Core — Compartir pantalla</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f17;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      padding: 32px;
    }
    h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
    p { font-size: 14px; color: #94a3b8; text-align: center; max-width: 400px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
      width: 100%;
      max-width: 700px;
      max-height: 340px;
      overflow-y: auto;
    }
    .source {
      border: 2px solid #2d2d3d;
      border-radius: 10px;
      padding: 10px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      background: #181825;
    }
    .source:hover { border-color: #6366f1; }
    .source.selected { border-color: #6366f1; background: rgba(99,102,241,0.1); }
    .source img { width: 100%; aspect-ratio: 16/9; object-fit: cover; border-radius: 6px; background: #000; display: block; }
    .source .no-thumb {
      width: 100%; aspect-ratio: 16/9; background: #11111b;
      border-radius: 6px; display: flex; align-items: center; justify-content: center;
      color: #475569; font-size: 28px;
    }
    .source span { display: block; font-size: 12px; margin-top: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .btn {
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 12px 32px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      width: 100%;
      max-width: 700px;
    }
    .btn:hover { background: #4f46e5; }
    .btn:disabled { background: #2d2d3d; color: #475569; cursor: not-allowed; }
    .loading { color: #6366f1; font-size: 14px; }
  </style>
</head>
<body>
  <h1>¿Qué querés compartir?</h1>
  <p>Elegí la pantalla o ventana que verá el cliente remoto.</p>
  <div class="grid" id="grid"><p class="loading">Cargando pantallas...</p></div>
  <button class="btn" id="btn" disabled>Compartir</button>

  <script>
    let selectedId = null;

    async function load() {
      const sources = await window.coreDesktop.getSources();
      const grid = document.getElementById("grid");
      grid.innerHTML = "";
      sources.forEach(src => {
        const div = document.createElement("div");
        div.className = "source";
        div.innerHTML = src.thumbnail
          ? `<img src="${src.thumbnail}" />`
          : `<div class="no-thumb">🖥</div>`;
        div.innerHTML += `<span>${src.name}</span>`;
        div.onclick = () => {
          document.querySelectorAll(".source").forEach(s => s.classList.remove("selected"));
          div.classList.add("selected");
          selectedId = src.id;
          document.getElementById("btn").disabled = false;
        };
        grid.appendChild(div);
        // Auto-seleccionar primero
        if (!selectedId) div.click();
      });
    }

    document.getElementById("btn").onclick = async () => {
      if (!selectedId) return;
      const btn = document.getElementById("btn");
      btn.disabled = true;
      btn.textContent = "Iniciando...";
      await window.coreDesktop.selectSource(selectedId);
    };

    load();
  </script>
</body>
</html>
